name: Daily Forex Rate Download

on:
  workflow_dispatch: # Allows manual trigger from the GitHub "Actions" tab

jobs:
  download-pdf:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install curl_cffi
      run: |
        pip install curl_cffi

    - name: Download Forex PDF
      run: |
        YEAR=$(date '+%Y')
        MONTH=$(date '+%m')
        FILENAME=$(date '+%Y-%m-%d-%H:%M').pdf
        
        mkdir -p "$YEAR/$MONTH"
        
        # We use Python and curl_cffi to perfectly impersonate a Chrome browser
        python -c "
from curl_cffi import requests
url = 'https://sbi.bank.in/documents/16012/1400784/FOREX_CARD_RATES.pdf'
response = requests.get(url, impersonate='chrome120')
if response.status_code == 200:
    with open('$YEAR/$MONTH/$FILENAME', 'wb') as f:
        f.write(response.content)
    print('Download successful!')
else:
    print(f'Failed to download. Status code: {response.status_code}')
    exit(1)
        "

    - name: Commit and Push changes
      run: |
        git config --global user.name "Shivam Khandelwal (auto commit)"
        git config --global user.email "noreply@shivamkhandelwal.in"
        
        git add .
        
        # Only commit and push if the file was successfully downloaded and there are changes
        if ! git diff --cached --quiet; then
          git commit -m "Daily update $(date '+%Y-%m-%d-%H:%M')"
          git push origin HEAD:${{ github.ref_name }}
        else
          echo "No changes to commit"
        fi
