name: Daily Forex Rate Download

on:
  #schedule:
    # Runs every day at 06:00 UTC (11:30 AM IST). Adjust the cron as needed.
    #- cron: '0 6 * * *'
  workflow_dispatch: # Allows you to trigger the script manually from the Actions tab

jobs:
  download-pdf:
    runs-on: ubuntu-latest
    
    # Grants permission to push commits back to the repository
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download and install curl-impersonate
      run: |
        sudo apt-get update
        # Download the latest libcurl-impersonate chrome build
        # Note: You can pinning a specific version if needed, or use python/javascript tools like playwright if this breaks.
        curl -s https://api.github.com/repos/lwthiker/curl-impersonate/releases/latest \
        | grep "browser_download_url.*chrome-linux.tar.gz" \
        | cut -d : -f 2,3 \
        | tr -d \" \
        | wget -qi -
        
        mkdir curl-impersonate
        tar -xf curl-impersonate-chrome-linux.tar.gz -C curl-impersonate
        # Add to path
        echo "$GITHUB_WORKSPACE/curl-impersonate" >> $GITHUB_PATH

    - name: Download Forex PDF
      run: |
        # Replicating your exact directory structure and naming logic
        YEAR=$(date '+%Y')
        MONTH=$(date '+%m')
        FILENAME=$(date '+%Y-%m-%d-%H:%M').pdf
        
        mkdir -p "$YEAR/$MONTH"
        
        # Using the installed curl-impersonate-chrome
        ./curl-impersonate/curl-impersonate-chrome -L "https://sbi.bank.in/documents/16012/1400784/FOREX_CARD_RATES.pdf" -o "$YEAR/$MONTH/$FILENAME"

    - name: Commit and Push changes
      run: |
        git config --global user.name "Shivam Khandelwal (auto commit)"
        git config --global user.email "noreply@shivamkhandelwal.in"
        
        git add .
        
        # Only commit and push if the file was successfully downloaded and there are changes
        if ! git diff --cached --quiet; then
          git commit -m "Daily update $(date '+%Y-%m-%d-%H:%M')"
          git push origin HEAD:${{ github.ref_name }}
        else
          echo "No changes to commit"
        fi
