name: Daily Forex Rate Download

on:
  schedule:
    # 1. At 08:45 UTC (14:15 PM IST) every day
    - cron: '45 8 * * *'
    # 2. At 14:00 UTC (19:30 / 7:30 PM IST) every day
    - cron: '0 14 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub "Actions" tab

jobs:
  download-pdf:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install curl_cffi
      run: |
        pip install curl_cffi

    - name: Download Forex PDF
      run: |
        YEAR=$(date '+%Y')
        MONTH=$(date '+%m')
        FILENAME=$(date '+%Y-%m-%d-%H:%M').pdf
        
        mkdir -p "$YEAR/$MONTH"
        
        # Write the python execution script to a standalone file
        # This completely isolates python colons (:) from the YAML compiler
        printf "import sys\nfrom curl_cffi import requests\n\nurl = 'https://sbi.bank.in/documents/16012/1400784/FOREX_CARD_RATES.pdf'\noutput_path = sys.argv[1]\n\ntry:\n    response = requests.get(url, impersonate='chrome120', timeout=30)\n    if response.status_code == 200:\n        with open(output_path, 'wb') as f:\n            f.write(response.content)\n        print('Download successful!')\n    else:\n        print('Failed to download. Status code:', response.status_code)\n        sys.exit(1)\nexcept Exception as e:\n    print('An error occurred:', e)\n    sys.exit(1)\n" > run_download.py

        # Run the isolated script
        python run_download.py "$YEAR/$MONTH/$FILENAME"
        
        # Clean up the script file
        rm run_download.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "execve (auto commit)"
        git config --global user.email "execve@gmail.com"
        
        git add .
        
        if ! git diff --cached --quiet; then
          git commit -m "Daily update $(date '+%Y-%m-%d-%H:%M')"
          git push origin HEAD:${{ github.ref_name }}
        else
          echo "No changes to commit"
        fi
